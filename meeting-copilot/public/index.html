<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Copilot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }
  #main-content { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; height: 100%; }
  #suggestions-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 12px; scrollbar-width: none; position: relative; }
  #suggestions-panel::-webkit-scrollbar { display: none; }
  #suggestions-flow { font-size: 12px; line-height: 1.9; word-break: break-word; user-select: text; }
  .suggestion-entry { display: block; color: #e0e0e0; margin: 0; }
  .divider { height: 1px; flex-shrink: 0; cursor: row-resize; position: relative; z-index: 5; }
  .divider::before { content: ''; position: absolute; top: -33px; bottom: -33px; left: 0; right: 0; cursor: row-resize; }
  #transcript-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  #transcript-strip { flex: 1; min-height: 0; padding: 6px 12px; font-size: 12px; color: #888; overflow-y: auto; line-height: 1.5; scrollbar-width: none; word-break: break-word; user-select: text; }
  #transcript-strip::-webkit-scrollbar { display: none; }
  #transcript-interim { font-style: italic; color: #444; }
  button { background: none; border: none; color: #555; font-size: 12px; font-family: monospace; cursor: pointer; padding: 4px 6px; }
  button:active { color: #e0e0e0; }
  #floating-controls {
    position: fixed; bottom: 10px; left: 12px; z-index: 100;
    display: flex; flex-direction: column-reverse; align-items: center; gap: 20px;
  }
  #clear-btn { color: #fff; font-size: 20px; padding: 6px; }
  #menu-btn { font-size: 20px; flex-shrink: 0; transition: color 0.3s; padding: 6px; }
  #img-btn { font-size: 22px; color: #888; padding: 6px; position: relative; font-family: monospace; }
  #img-btn.has-images { color: #61afef; }
  #img-badge { display: none; position: absolute; top: 0; right: -2px; background: #61afef; color: #0d0d0d; font-size: 9px; border-radius: 50%; width: 14px; height: 14px; line-height: 14px; text-align: center; }
  #img-input { display: none; }
  #img-list {
    display: none; position: fixed; background: #0d0d0d; border-radius: 6px;
    z-index: 1000; min-width: 160px; max-height: 40vh; overflow-y: auto; scrollbar-width: none; padding: 4px 0;
  }
  .img-row { display: flex; align-items: center; padding: 6px 12px; gap: 8px; }
  .img-thumb { width: 28px; height: 28px; object-fit: cover; border-radius: 3px; }
  .img-name { flex: 1; color: #aaa; font-size: 11px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .img-remove { color: #e06c75; font-size: 14px; cursor: pointer; padding: 2px 4px; background: none; border: none; font-family: monospace; }

  #file-popup {
    display: none; position: fixed; background: #0d0d0d; border: none;
    border-radius: 6px; box-shadow: none; z-index: 1000;
    min-width: 140px; max-height: 40vh; overflow-y: auto; scrollbar-width: none;
  }
  .file-row {
    display: flex; align-items: center; width: 100%; padding: 8px 12px;
    cursor: pointer; gap: 8px;
  }
  .file-row:active { background: #1a1a1a; }
  .file-name { flex: 1; color: #aaa; font-size: 12px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-edit { color: #e0e0e0; font-size: 14px; padding: 2px 6px; flex-shrink: 0; cursor: pointer; }
  .file-edit:active { color: #e0e0e0; }
  .file-divider { height: 1px; background: #2a2a2a; margin: 2px 12px; }
  #new-file-row { display: flex; align-items: center; width: 100%; padding: 8px 12px; cursor: pointer; gap: 8px; }
  #new-file-row:active { background: #1a1a1a; }

  #file-editor {
    display: none; position: fixed; inset: 0; z: 2000; background: #0d0d0d; flex-direction: column;
  }
  #editor-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; flex-shrink: 0; }
  #editor-name { color: #61afef; font-size: 12px; font-family: monospace; }
  #editor-textarea { flex: 1; background: #111; color: #e0e0e0; font-size: 12px; font-family: monospace; border: none; outline: none; padding: 8px 12px; resize: none; user-select: text; }

  #no-speech-warning {
    display: none; position: fixed; top: 0; left: 0; right: 0;
    background: #e06c75; color: #0d0d0d; text-align: center;
    padding: 8px; font-size: 12px; z-index: 3000;
  }
</style>
</head>
<body>
<div id="no-speech-warning">
  Web Speech API not supported in this browser. Use Chrome or Edge.
</div>
<div id="main-content">
  <div id="suggestions-panel">
    <div id="suggestions-flow"></div>
  </div>
  <div class="divider"></div>
  <div id="transcript-panel">
    <div id="transcript-strip">
      <span id="transcript-interim"></span><span id="transcript-text"></span>
    </div>
  </div>
</div>
<div id="floating-controls">
  <button id="clear-btn">&#x21BA;</button>
  <button id="img-btn" title="Upload file">+<span id="img-badge"></span></button>
  <input type="file" id="img-input" accept="image/*,.pdf,.txt,.md,.csv,.json,.html,.doc,.docx,.xls,.xlsx" multiple>
  <button id="menu-btn" title="Context files">*</button>
</div>
<div id="img-list"></div>
<div id="file-popup"></div>

<div id="file-editor">
  <div id="editor-header">
    <span id="editor-name"></span>
    <div>
      <button id="editor-save" style="color:#98c379;padding:4px 8px;font-size:16px">ok</button>
      <button id="editor-close" style="color:#e06c75;padding:4px 8px;font-size:16px">x</button>
    </div>
  </div>
  <textarea id="editor-textarea"></textarea>
</div>

<script>
// iOS height fix
function fixHeight() { document.body.style.height = window.innerHeight + 'px'; }
fixHeight();
window.addEventListener('resize', fixHeight);

const textEl = document.getElementById('transcript-text');
const interimEl = document.getElementById('transcript-interim');
const sugFlow = document.getElementById('suggestions-flow');
const menuBtn = document.getElementById('menu-btn');
const sugPanel = document.getElementById('suggestions-panel');

function setStatusColor(c) { menuBtn.style.color = c; }
function appendSug(el) { sugFlow.appendChild(el); sugPanel.scrollTop = sugPanel.scrollHeight; }

function makeSuggestionEl(text) {
  var s = document.createElement('span');
  s.className = 'suggestion-entry';
  s.textContent = text.replace(/\*\*/g, '');
  return s;
}

// -- Web Speech API --
var SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var recognitionActive = false;

if (!SpeechRecognitionCtor) {
  document.getElementById('no-speech-warning').style.display = 'block';
}

function startRecognition() {
  if (!SpeechRecognitionCtor || recognitionActive) return;

  recognition = new SpeechRecognitionCtor();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onstart = function() {
    recognitionActive = true;
    setStatusColor('#5dbb5d');
  };

  recognition.onresult = function(event) {
    var interim = '';
    var finalText = '';

    for (var i = event.resultIndex; i < event.results.length; i++) {
      var transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += transcript;
      } else {
        interim += transcript;
      }
    }

    interimEl.textContent = interim;

    if (finalText.trim()) {
      interimEl.textContent = '';
      textEl.textContent += (textEl.textContent ? ' ' : '') + finalText.trim();
      document.getElementById('transcript-strip').scrollTop = 999999;

      if (_ws && _ws.readyState === WebSocket.OPEN) {
        _ws.send(JSON.stringify({ type: 'transcript', text: finalText.trim() }));
      }
    }
  };

  recognition.onerror = function(event) {
    recognitionActive = false;
    if (event.error === 'not-allowed') {
      setStatusColor('#e06c75');
      return;
    }
    setTimeout(startRecognition, 1000);
  };

  recognition.onend = function() {
    recognitionActive = false;
    setTimeout(startRecognition, 100);
  };

  try {
    recognition.start();
  } catch(e) {
    setTimeout(startRecognition, 2000);
  }
}

// -- WebSocket --
var _ws = null;

function connectWS() {
  var wsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host;
  var ws = new WebSocket(wsUrl);
  _ws = ws;

  ws.onopen = function() {
    setStatusColor('#5dbb5d');
    startRecognition();
  };

  ws.onclose = function() {
    setStatusColor('#e06c75');
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'status') {
      if (msg.text && msg.text.indexOf('Thinking') >= 0) setStatusColor('#61afef');
      else if (msg.text && msg.text.indexOf('Listening') >= 0) setStatusColor('#5dbb5d');
    } else if (msg.type === 'suggestion') {
      appendSug(makeSuggestionEl(msg.text));
    } else if (msg.type === 'session_resume') {
      if (msg.transcript) {
        textEl.textContent = msg.transcript;
        document.getElementById('transcript-strip').scrollTop = 999999;
      }
      if (msg.suggestions && msg.suggestions.length) {
        while (sugFlow.firstChild) sugFlow.removeChild(sugFlow.firstChild);
        msg.suggestions.forEach(function(su) { appendSug(makeSuggestionEl(su.text)); });
      }
      if (msg.images && msg.images.length) {
        _images = msg.images.map(function(p) { return { path: p, name: p.split('/').pop() }; });
        updateImgBadge();
      }
    }
  };
}

// Load saved session
fetch('/api/session').then(function(r) { return r.json(); }).then(function(data) {
  if (data.transcript) {
    textEl.textContent = data.transcript;
    document.getElementById('transcript-strip').scrollTop = 999999;
  }
  if (data.suggestions && data.suggestions.length) {
    while (sugFlow.firstChild) sugFlow.removeChild(sugFlow.firstChild);
    data.suggestions.forEach(function(su) { appendSug(makeSuggestionEl(su.text)); });
  }
  if (data.images && data.images.length) {
    _images = data.images.map(function(p) { return { path: p, name: p.split('/').pop() }; });
  }
}).catch(function() {});

connectWS();

// -- File popup --
var filePopup = document.getElementById('file-popup');

function makeFileRow(f) {
  var row = document.createElement('div'); row.className = 'file-row';
  row._fileId = f.id; row.dataset.id = f.id;
  var name = document.createElement('span'); name.className = 'file-name'; name.textContent = f.name;
  name.style.color = f.selected ? '#5dbb5d' : '#aaa';
  var edit = document.createElement('button'); edit.className = 'file-edit'; edit.textContent = '*';

  row.addEventListener('click', function(e) {
    if (e.target === edit) return;
    e.stopPropagation();
    f.selected = !f.selected;
    name.style.color = f.selected ? '#5dbb5d' : '#aaa';
    saveSelection();
  });

  edit.addEventListener('click', function(e) {
    e.stopPropagation();
    filePopup.style.display = 'none';
    openEditor(f);
  });

  row.appendChild(name);
  row.appendChild(edit);
  return row;
}

function saveSelection() {
  var sel = [];
  filePopup.querySelectorAll('.file-row').forEach(function(row) {
    var n = row.querySelector('.file-name');
    if (row._fileId && n && n.style.color === 'rgb(93, 187, 93)') sel.push(row._fileId);
  });
  menuBtn.textContent = sel.length > 0 ? sel.length : '*';
  menuBtn.style.fontSize = sel.length > 0 ? '16px' : '20px';
  fetch('/api/selected-files', { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify({ selected: sel }) });
  if (_ws && _ws.readyState === WebSocket.OPEN) _ws.send(JSON.stringify({ type: 'select_files', selected: sel }));
}

function renderPopup() {
  fetch('/api/context-files').then(function(r) { return r.json(); }).then(function(files) {
    filePopup.textContent = '';
    var custom = files.filter(function(f) { return f.id.indexOf('ctx:') === 0; });
    var projects = files.filter(function(f) { return f.id.indexOf('proj:') === 0; });

    custom.forEach(function(f) { filePopup.appendChild(makeFileRow(f)); });
    if (custom.length && projects.length) {
      var div = document.createElement('div'); div.className = 'file-divider'; filePopup.appendChild(div);
    }
    projects.forEach(function(f) { filePopup.appendChild(makeFileRow(f)); });

    var newRow = document.createElement('div'); newRow.id = 'new-file-row';
    var plus = document.createElement('span');
    plus.style.cssText = 'color:#98c379;font-size:14px';
    plus.textContent = '+';
    newRow.appendChild(plus);
    newRow.addEventListener('click', function(e) { e.stopPropagation(); createNewFile(); });
    filePopup.appendChild(newRow);

    var n = files.filter(function(f) { return f.selected; }).length;
    menuBtn.textContent = n > 0 ? n : '*';
    menuBtn.style.fontSize = n > 0 ? '16px' : '20px';
  });
}

menuBtn.addEventListener('click', function(e) {
  var open = filePopup.style.display === 'block';
  filePopup.style.display = open ? 'none' : 'block';
  if (!open) {
    renderPopup();
    var r = menuBtn.getBoundingClientRect();
    filePopup.style.left = r.left + 'px';
    filePopup.style.bottom = (window.innerHeight - r.top + 6) + 'px';
  }
  e.stopPropagation();
});
document.addEventListener('click', function() { filePopup.style.display = 'none'; });

function createNewFile() {
  var name = prompt('File name:');
  if (!name) return;
  fetch('/api/context-file/create', { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify({ name: name }) })
    .then(function(r) { return r.json(); }).then(function(data) {
      if (data.ok) { openEditor({ id: data.id, name: name }); renderPopup(); }
      else { alert(data.error || 'Failed'); }
    });
}

// -- File editor --
var fileEditor = document.getElementById('file-editor');
var editorTextarea = document.getElementById('editor-textarea');
var editorNameEl = document.getElementById('editor-name');
var _editingFileId = null;

function openEditor(f) {
  _editingFileId = f.id;
  editorNameEl.textContent = f.name;
  fetch('/api/context-file?id=' + encodeURIComponent(f.id)).then(function(r) { return r.text(); }).then(function(text) {
    editorTextarea.value = text;
    fileEditor.style.display = 'flex';
  });
}

document.getElementById('editor-save').addEventListener('click', function() {
  fetch('/api/context-file', { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify({ id: _editingFileId, content: editorTextarea.value }) })
    .then(function() { fileEditor.style.display = 'none'; });
});
document.getElementById('editor-close').addEventListener('click', function() { fileEditor.style.display = 'none'; });

// -- Image upload --
var imgBtn = document.getElementById('img-btn');
var imgInput = document.getElementById('img-input');
var imgBadge = document.getElementById('img-badge');
var imgListEl = document.getElementById('img-list');
var _images = [];

function updateImgBadge() {
  if (_images.length > 0) {
    imgBadge.textContent = _images.length;
    imgBadge.style.display = 'block';
    imgBtn.classList.add('has-images');
  } else {
    imgBadge.style.display = 'none';
    imgBtn.classList.remove('has-images');
  }
}

imgBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  if (_images.length > 0) {
    var open = imgListEl.style.display === 'block';
    imgListEl.style.display = open ? 'none' : 'block';
    if (!open) renderImgList();
  } else {
    imgInput.click();
  }
});

imgBtn.addEventListener('dblclick', function(e) {
  e.stopPropagation();
  imgInput.click();
});

function renderImgList() {
  while (imgListEl.firstChild) imgListEl.removeChild(imgListEl.firstChild);
  _images.forEach(function(img) {
    var row = document.createElement('div'); row.className = 'img-row';
    var fname = img.path.split('/').pop();
    var isImage = /\.(png|jpe?g|gif|webp)$/i.test(fname);
    var thumb;
    if (isImage) {
      thumb = document.createElement('img'); thumb.className = 'img-thumb';
      thumb.src = '/uploads/' + fname;
    } else {
      thumb = document.createElement('span'); thumb.className = 'img-thumb';
      thumb.style.cssText = 'display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#888;font-size:9px;border-radius:3px';
      thumb.textContent = fname.split('.').pop().toUpperCase().slice(0, 3);
    }
    var nameEl = document.createElement('span'); nameEl.className = 'img-name'; nameEl.textContent = img.name;
    var rm = document.createElement('button'); rm.className = 'img-remove'; rm.textContent = 'x';
    rm.addEventListener('click', function(e) {
      e.stopPropagation();
      fetch('/api/remove-image', { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify({ path: img.path }) });
      _images = _images.filter(function(i) { return i.path !== img.path; });
      updateImgBadge();
      renderImgList();
      if (_images.length === 0) imgListEl.style.display = 'none';
    });
    row.appendChild(thumb); row.appendChild(nameEl); row.appendChild(rm);
    imgListEl.appendChild(row);
  });
  var addRow = document.createElement('div'); addRow.className = 'img-row';
  var addLabel = document.createElement('span');
  addLabel.style.cssText = 'color:#98c379;font-size:14px;cursor:pointer';
  addLabel.textContent = '+ add';
  addRow.appendChild(addLabel);
  addRow.addEventListener('click', function(e) { e.stopPropagation(); imgInput.click(); });
  imgListEl.appendChild(addRow);
  var r = imgBtn.getBoundingClientRect();
  imgListEl.style.left = r.left + 'px';
  imgListEl.style.bottom = (window.innerHeight - r.top + 6) + 'px';
}

document.addEventListener('click', function() { imgListEl.style.display = 'none'; });

imgInput.addEventListener('change', async function() {
  var files = imgInput.files;
  if (!files || !files.length) return;
  for (var k = 0; k < files.length; k++) {
    var fd = new FormData();
    fd.append('image', files[k]);
    try {
      var res = await fetch('/api/upload-image', { method: 'POST', body: fd });
      var data = await res.json();
      if (data.ok) {
        _images.push({ path: data.path, name: data.name });
        updateImgBadge();
        if (_ws && _ws.readyState === WebSocket.OPEN) {
          _ws.send(JSON.stringify({ type: 'image_added', path: data.path, name: data.name }));
        }
      }
    } catch(e) {}
  }
  imgInput.value = '';
});

// -- Clear --
document.getElementById('clear-btn').addEventListener('click', function() {
  textEl.textContent = ''; interimEl.textContent = '';
  while (sugFlow.firstChild) sugFlow.removeChild(sugFlow.firstChild);
  _images = []; updateImgBadge(); imgListEl.style.display = 'none';
  if (_ws && _ws.readyState === WebSocket.OPEN) _ws.send(JSON.stringify({ type: 'clear' }));
});

// -- Draggable divider --
(function() {
  var pA = document.getElementById('suggestions-panel');
  var pB = document.getElementById('transcript-panel');
  var divider = document.querySelector('.divider');
  var strip = document.getElementById('transcript-strip');
  var MIN = 44;
  var dragging = false, startY = 0, hA0 = 0, hB0 = 0, total0 = 0;

  function down(e) {
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    hA0 = pA.getBoundingClientRect().height;
    hB0 = pB.getBoundingClientRect().height;
    total0 = document.getElementById('main-content').getBoundingClientRect().height - divider.getBoundingClientRect().height;
    e.preventDefault();
  }
  function move(e) {
    if (!dragging) return;
    var y = e.touches ? e.touches[0].clientY : e.clientY;
    var dy = y - startY;
    var hA = Math.max(MIN, hA0 + dy);
    var hB = total0 - hA;
    if (hB < MIN) { hB = MIN; hA = total0 - hB; }
    pA.style.flex = 'none'; pA.style.height = hA + 'px';
    pB.style.flex = 'none'; pB.style.height = hB + 'px';
    if (strip.scrollTop >= strip.scrollHeight - strip.clientHeight - 4) strip.scrollTop = strip.scrollHeight;
    e.preventDefault();
  }
  function up() { dragging = false; }

  divider.addEventListener('mousedown', down);
  divider.addEventListener('touchstart', down, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
})();

// -- Init --
fetch('/api/context-files').then(function(r) { return r.json(); }).then(function(files) {
  var n = files.filter(function(f) { return f.selected; }).length;
  menuBtn.textContent = n > 0 ? n : '*';
  menuBtn.style.fontSize = n > 0 ? '16px' : '20px';
}).catch(function() {});

window.addEventListener('pagehide', function() { if (_ws) { _ws.onclose = null; _ws.close(); } });
</script>
</body>
</html>
